name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check server.js
      - name: Validate palette.json
        run: node -e "JSON.parse(require('fs').readFileSync('palette.json','utf8')); console.log('palette.json OK')"
